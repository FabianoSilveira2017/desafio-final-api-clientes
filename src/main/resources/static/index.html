<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALGADAS</title>

    <!-- Meta tags para comportamento de App (PWA) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#008000">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #008000; /* Verde */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            color: white;
            font-family: sans-serif;
            font-size: 20vw; /* Tamanho responsivo */
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            user-select: none;
            text-align: center;
        }

        /* Forçar visualização horizontal mesmo se o celular estiver em pé */
        @media screen and (orientation: portrait) {
            body {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100vh;
                height: 100vw;
                /* Centraliza e depois rotaciona */
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center;
            }
        }
    </style>
</head>
<body>
    <h1 id="message">SALGADAS</h1>

    <script>
        // Função para manter a tela ligada (Wake Lock API)
        let wakeLock = null;

        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Tela mantida ligada (Wake Lock ativo)');
                } else {
                    console.warn('Wake Lock API não suportada neste navegador.');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        };

        // Tentar ativar ao carregar e ao clicar (necessário interação do usuário para algumas APIs)
        const activate = async () => {
            await requestWakeLock();
            // Tentar entrar em tela cheia
            if (!document.fullscreenElement) {
                try {
                    await document.documentElement.requestFullscreen();
                } catch (e) {
                    console.log('Fullscreen não permitido ou cancelado', e);
                }
            }
        };

        document.addEventListener('click', activate);
        document.addEventListener('touchstart', activate);

        // Reativar se a visibilidade mudar (ex: usuário trocou de aba e voltou)
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // Tentativa inicial
        requestWakeLock();
    </script>
</body>
</html>
